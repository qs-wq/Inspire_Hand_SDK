# RH5DG2（13 自由度）RS485 设备配置 —— 硬件测试用
# 配合 ros2_controller_config_rh5dg2.yaml；单设备模式启动：--device hand_left

protocol:
  type: RH5DG2_485

devices:
  - name: hand_left
    port: /dev/ttyUSB0
    baudrate: 115200
    Hand_ID: 1

logging:
  level: INFO
  file: logs/rh5dg2_hand.log
  console: true
  file_enable: false
  max_file_size_mb: 10
  max_files: 5
