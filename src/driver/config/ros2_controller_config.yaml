# RH56DFX ROS2 控制器示例配置（与 ros2_controller_config.yaml 内容一致，便于 --controller-config 显式指定）
# 6 自由度；服务项与 RH56F1 对齐（协议已支持的子集）

device_nodes:
  - device: hand_left
    update_rate: 50

    publish_header:
      frame_id: "hand_left"

    joint_names:
      - "hand_left/joint_0"
      - "hand_left/joint_1"
      - "hand_left/joint_2"
      - "hand_left/joint_3"
      - "hand_left/joint_4"
      - "hand_left/joint_5"

    topics:
      - name: angle_control
        registers:
          write: ["angleSet"]
          read: ["angleAct"]
        command_topic: "/hand_left/angle_set"
        state_topic: "/hand_left/angle_actual"

      - name: force_control
        registers:
          write: ["forceSet"]
          read: ["forceAct"]
        command_topic: "/hand_left/force_set"
        state_topic: "/hand_left/force_actual"

      - name: speed_control
        registers:
          write: ["speedSet"]
        command_topic: "/hand_left/speed_set"

    services:
      - register_name: "angleSet"
        set_service_name: "/hand_left/set_angle"
        is_write_register: true

      - register_name: "forceSet"
        set_service_name: "/hand_left/set_force"
        is_write_register: true

      - register_name: "speedSet"
        set_service_name: "/hand_left/set_speed"
        is_write_register: true

      - register_name: "id"
        set_service_name: "/hand_left/set_id"
        is_write_register: true

      - register_name: "baudRate"
        set_service_name: "/hand_left/set_baudRate"
        is_write_register: true

      - register_name: "clearError"
        set_service_name: "/hand_left/set_clearError"
        is_write_register: true

      - register_name: "save"
        set_service_name: "/hand_left/set_save"
        is_write_register: true

      - register_name: "actionSeqIndex"
        set_service_name: "/hand_left/set_actionSeqIndex"
        is_write_register: true

      - register_name: "errorCode"
        get_service_name: "/hand_left/get_errorCode"
        is_write_register: false

      - register_name: "status"
        get_service_name: "/hand_left/get_status"
        is_write_register: false

      - register_name: "temp"
        get_service_name: "/hand_left/get_temp"
        is_write_register: false
